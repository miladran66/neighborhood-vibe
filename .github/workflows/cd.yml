name: CD — Deploy to GKE

on:
  workflow_run:
    workflows: ["CI — Build & Push"]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: northamerica-northeast1
  REPOSITORY: neighborhood-vibe
  CLUSTER_NAME: neighborhood-vibe-cluster
  CLUSTER_PROJECT: neighborhood-vibe-project   
  BACKEND_IMAGE: backend
  FRONTEND_IMAGE: frontend
jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
	  project_id: neighborhood-vibe-project 

      - name: Set image tags in K8s manifests
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          BACKEND_FULL=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BACKEND_IMAGE }}:${IMAGE_TAG}
          FRONTEND_FULL=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG}
          sed -i "s|IMAGE_BACKEND_PLACEHOLDER|${BACKEND_FULL}|g" infra/k8s/backend.yml
          sed -i "s|IMAGE_FRONTEND_PLACEHOLDER|${FRONTEND_FULL}|g" infra/k8s/frontend.yml

      - name: Apply Kubernetes secrets
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --from-literal=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to GKE
        run: kubectl apply -f infra/k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s

      - name: Get external IP
        run: |
          kubectl get service frontend-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}'